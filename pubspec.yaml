name: wl_reader
description: A cross-platform light novel reader MVP built with Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.1
  file_picker: ^8.1.7
  html: ^0.15.4
  image: ^4.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.2
  shared_preferences: ^2.3.5
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
